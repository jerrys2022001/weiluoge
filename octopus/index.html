<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Octopus</title>
  <meta name="description" content="Octopus is an iPhone companion for continuing Codex sessions from mobile.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://octopus.velocai.net/">
  <link rel="icon" type="image/png" href="/octopus.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef7f8;
      --surface: rgba(255, 255, 255, 0.9);
      --text: #15202e;
      --muted: #5b6775;
      --accent: #0f766e;
      --line: #d7e3ea;
      --shadow: 0 28px 80px rgba(21, 32, 46, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.18), transparent 28%),
        linear-gradient(180deg, #f8fffd 0%, var(--bg) 100%);
    }

    main {
      width: min(760px, 100%);
      padding: clamp(26px, 5vw, 44px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    img {
      width: 74px;
      height: 74px;
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(15, 118, 110, 0.18);
    }

    h1 {
      margin: 20px 0 12px;
      font-size: clamp(2.4rem, 7vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    p {
      max-width: 36rem;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent);
      background: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    a.primary {
      color: #ffffff;
      border-color: var(--accent);
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <img src="/octopus.png" alt="Octopus app icon" width="103" height="103">
    <h1>Octopus</h1>
    <p>
      Octopus is an iPhone companion for connecting to Codex sessions, reviewing pending approvals,
      continuing threads, and keeping track of automation work from mobile.
    </p>
    <nav aria-label="Octopus links">
      <a class="primary" href="/privacy/">Privacy Policy</a>
      <a href="https://apps.apple.com/app/id6763834077" target="_blank" rel="noopener noreferrer">App Store</a>
    </nav>
  </main>
</body>
</html>
